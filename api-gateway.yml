spring:
  application:
    name: api-gateway

  cloud:
    discovery:
      enabled: true

    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**

            - id: mentor-service
              uri: lb://MENTOR-SERVICE
              predicates:
                - Path=/mentors/**

server:
  port: 8092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
