
server:
  port: 8093

spring:
  application:
    name: mentor-service

  datasource:
    url: jdbc:mysql://mysql:3306/mentor_db?createDatabaseIfNotExist=true
    # has been changed to mysql for docker.
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
      # has been changed to eureka server for docker.
      register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: 127.0.0.1
    
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://zipkin:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: "*"


