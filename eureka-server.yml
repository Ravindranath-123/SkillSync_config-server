server:
  port: 8761

spring:
  application:
    name: eureka-server
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    serviceUrl:
    defaultZone: http://eureka-server:8761/eureka/
