
server:
  port: 8097

spring:
  application:
    name: review-service

  datasource:
    url: jdbc:mysql://mysql:3306/review_db?createDatabaseIfNotExist=true
    # has been changed to eureka server for docker.
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true 

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
# has been changed to eureka server for docker.
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: "*"
