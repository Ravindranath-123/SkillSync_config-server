
server:
  port: 8096

spring:
  application:
    name: session-service

  datasource:
    url: jdbc:mysql://mysql:3306/session_db?createDatabaseIfNotExist=true
  # has been changed to eureka server for docker.
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 5
          max-interval: 10000

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka    
# has been changed to eureka server for docker.
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  endpoints:
    web:
      exposure:
        include: "*"
